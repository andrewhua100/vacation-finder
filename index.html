<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US Vibe Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f2ede3;
    --panel: #fdfaf4;
    --border: #ddd6c4;
    --text: #2a2418;
    --muted: #8a7f6e;
    --accent: #c4793a;
    --accent-light: #f5e8d8;
    --green: #3d8c5a;
    --red: #c44040;
    --amber: #c49a3a;
    --amber-light: #fdf3d8;
    --shadow: 0 2px 12px rgba(42,36,24,0.08);
    --shadow-lg: 0 8px 32px rgba(42,36,24,0.14);
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    align-items: center;
    padding: 12px 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    gap: 16px;
    flex-shrink: 0;
    box-shadow: var(--shadow);
    z-index: 10;
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 21px; font-weight: 700; letter-spacing: -0.3px; }
  .logo span { color: var(--accent); }
  .tagline { font-size: 11px; color: var(--muted); font-weight: 400; letter-spacing: 0.6px; text-transform: uppercase; margin-top: 1px; }
  .match-pill {
    margin-left: auto;
    background: var(--green);
    color: #fff;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 12.5px;
    font-weight: 600;
    transition: all 0.3s ease;
    opacity: 0;
  }
  .match-pill.visible { opacity: 1; }
  .main { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  .sidebar {
    width: 272px;
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 18px 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 9px;
  }
  .month-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
  .month-btn {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    padding: 7px 3px 5px;
    cursor: pointer;
    transition: all 0.14s ease;
    text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 1px;
    font-family: 'DM Sans', sans-serif;
  }
  .month-btn:hover { border-color: var(--amber); background: var(--amber-light); }
  .month-btn.active { background: var(--amber); border-color: var(--amber); color: #fff; }
  .month-num { font-size: 8.5px; font-weight: 600; opacity: 0.55; }
  .month-name { font-size: 11.5px; font-weight: 600; }
  .tag-group { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    display: flex; align-items: center; gap: 5px;
    padding: 6px 11px;
    border-radius: 18px;
    border: 1.5px solid var(--border);
    background: #fff;
    cursor: pointer;
    font-size: 12px; font-weight: 500;
    transition: all 0.14s ease;
    user-select: none;
    white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
  }
  .tag:hover { border-color: var(--accent); background: var(--accent-light); }
  .tag.active { background: var(--text); border-color: var(--text); color: #fff; }
  .tag .icon { font-size: 12px; }
  .clear-btn {
    background: none; border: 1.5px solid var(--border); border-radius: 7px;
    padding: 8px 14px; cursor: pointer; font-size: 12px; font-weight: 500;
    color: var(--muted); font-family: 'DM Sans', sans-serif;
    transition: all 0.14s ease; width: 100%;
  }
  .clear-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  /* MAP */
  .map-area { flex: 1; position: relative; overflow: hidden; background: #c8dce8; cursor: grab; }
  .map-area:active { cursor: grabbing; }
  #map-svg { width: 100%; height: 100%; }

  /* D3 map elements */
  .state-path { fill: #d6e8c4; stroke: #b4c8a0; stroke-width: 0.6px; transition: fill 0.2s; }
  .state-path:hover { fill: #c8e0b4; }
  .graticule { fill: none; stroke: #b8ccd8; stroke-width: 0.4px; }
  .nation-border { fill: none; stroke: #8aaa78; stroke-width: 1.2px; }

  .city-group { cursor: pointer; }
  .city-circle { transition: r 0.25s ease, fill 0.3s ease, opacity 0.3s ease; }
  .city-label {
    font-family: 'DM Sans', sans-serif;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .city-pulse { pointer-events: none; }

  /* Tooltip */
  #tooltip {
    position: absolute;
    background: #1e1a14;
    color: #fff;
    border-radius: 12px;
    font-size: 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s ease;
    width: 240px;
    z-index: 100;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
  }
  #tooltip.show { opacity: 1; }
  .tt-header { padding: 11px 14px 8px; }
  #tooltip .tt-name { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; margin-bottom: 1px; }
  #tooltip .tt-state { opacity: 0.5; font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; }

  /* Slideshow */
  .tt-slideshow {
    position: relative;
    width: 100%;
    height: 140px;
    background: #0e0c09;
    overflow: hidden;
  }
  .tt-slide {
    position: absolute;
    inset: 0;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.7s ease;
  }
  .tt-slide.active { opacity: 1; }
  .tt-slide-dots {
    position: absolute;
    bottom: 7px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 5px;
    z-index: 2;
  }
  .tt-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    transition: background 0.3s;
  }
  .tt-dot.active { background: #fff; }

  .tt-body { padding: 10px 14px 12px; }
  #tooltip .tt-vibes { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 7px; }
  #tooltip .tt-vibe { background: rgba(255,255,255,0.12); border-radius: 4px; padding: 2px 6px; font-size: 10px; text-transform: capitalize; }
  #tooltip .tt-months { font-size: 10px; opacity: 0.6; }
  #tooltip .tt-warn { color: #ff9a9a; font-size: 10px; margin-top: 4px; }

  /* Legend */
  .legend {
    position: absolute; bottom: 18px; right: 18px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 11px 15px; box-shadow: var(--shadow);
    z-index: 10;
  }
  .legend-title { font-size: 9.5px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .legend-row { display: flex; align-items: center; gap: 8px; font-size: 11.5px; font-weight: 500; margin-bottom: 5px; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  /* Zoom controls */
  .zoom-controls {
    position: absolute; bottom: 18px; left: 18px;
    display: flex; flex-direction: column; gap: 5px;
    z-index: 10;
  }
  .zoom-btn {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px; font-weight: 600;
    color: var(--muted); box-shadow: var(--shadow);
    font-family: 'DM Sans', sans-serif;
    transition: all 0.14s ease;
    line-height: 1;
  }
  .zoom-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .zoom-btn.reset { font-size: 11px; font-weight: 600; width: auto; padding: 0 10px; letter-spacing: 0.3px; }

  /* Hint bar */
  .hint {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 20px; padding: 7px 16px;
    font-size: 12px; color: var(--muted); box-shadow: var(--shadow);
    white-space: nowrap; pointer-events: none;
    transition: opacity 0.4s ease;
    z-index: 10;
  }
  .hint.hidden { opacity: 0; }

  /* Loading */
  .map-loading {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #c8dce8; font-size: 13px; color: #7090a0; font-weight: 500;
    pointer-events: none; transition: opacity 0.5s;
    z-index: 20;
  }
  .map-loading.done { opacity: 0; }
</style>
</head>

// Compute label positions with robust collision avoidance
function computeLabelPositions(cities) {
  const FONT_SIZE = 7.5;   // must match the rendered font-size below
  const CHAR_WIDTH = 4.4;  // measured: DM Sans 7.5px ≈ 4.4px per char
  const FONT_HEIGHT = 9;   // line-height at 7.5px
  const PAD = 2;           // extra breathing room around each box
  const DOT_R = 8;         // clearance radius around other dots

  // 24 candidate angles, roughly evenly spread, biased toward cardinal directions
  const BASE_ANGLES = [
    0, 180, 315, 45, 270, 90, 225, 135,
    22, 158, 202, 338, 67, 112, 247, 292,
    11, 169, 191, 349, 79, 101, 259, 281
  ];

  function getLabelBox(cx, cy, dist, angle, text) {
    const rad = angle * Math.PI / 180;
    const w = text.length * CHAR_WIDTH + PAD * 2;
    const h = FONT_HEIGHT + PAD * 2;
    const lx = cx + Math.cos(rad) * dist;
    const ly = cy + Math.sin(rad) * dist;

    let anchor, bx, by;
    // Right half
    if (angle <= 45 || angle >= 315) {
      anchor = 'start';
      bx = lx - PAD;
      by = ly - h / 2;
    }
    // Left half
    else if (angle >= 135 && angle <= 225) {
      anchor = 'end';
      bx = lx - w + PAD;
      by = ly - h / 2;
    }
    // Bottom
    else if (angle > 45 && angle < 135) {
      anchor = 'middle';
      bx = lx - w / 2;
      by = ly - PAD;
    }
    // Top
    else {
      anchor = 'middle';
      bx = lx - w / 2;
      by = ly - h + PAD;
    }
    return { lx, ly, anchor, bx, by, bw: w, bh: h, dist };
  }

  function boxesOverlap(a, b) {
    const gap = 1;
    return !(a.bx + a.bw + gap < b.bx ||
             b.bx + b.bw + gap < a.bx ||
             a.by + a.bh + gap < b.by ||
             b.by + b.bh + gap < a.by);
  }

  function boxOverlapsDot(box, cx, cy) {
    const closestX = Math.max(box.bx, Math.min(cx, box.bx + box.bw));
    const closestY = Math.max(box.by, Math.min(cy, box.by + box.bh));
    const dx = cx - closestX, dy = cy - closestY;
    return dx * dx + dy * dy < DOT_R * DOT_R;
  }

  const placed = [];

  for (const city of cities) {
    const prefAngle = LABEL_PREFS[city.name] !== undefined ? LABEL_PREFS[city.name] : 0;

    // Build ordered angle list: preferred first, then the rest
    const angles = [prefAngle, ...BASE_ANGLES.filter(a => a !== prefAngle)];

    // Try: for each angle (preference order), sweep distances close→far.
    // This means preferred direction wins even if it needs more distance,
    // rather than a bad angle winning just because it's close.
    const distances = [10, 13, 17, 22, 28, 35, 44, 55];

    let bestBox = null;

    // First pass: try preferred angle at all distances, then other angles at all distances
    for (const angle of angles) {
      for (const dist of distances) {
        const box = getLabelBox(city.px, city.py, dist, angle, city.name);

        let bad = false;
        for (const p of placed) {
          if (boxesOverlap(box, p.box)) { bad = true; break; }
        }
        if (bad) continue;

        for (const c of cities) {
          if (c === city) continue;
          if (boxOverlapsDot(box, c.px, c.py)) { bad = true; break; }
        }
        if (bad) continue;

        bestBox = box;
        break;
      }
      if (bestBox) break;
    }

    // Hard fallback: minimum-overlap position (prefer preferred angle, shortest dist)
    if (!bestBox) {
      let minOverlapCount = Infinity;
      for (const dist of [10, 13, 17, 22, 28, 35]) {
        for (const angle of angles) {
          const box = getLabelBox(city.px, city.py, dist, angle, city.name);
          let overlapCount = 0;
          for (const p of placed) { if (boxesOverlap(box, p.box)) overlapCount++; }
          for (const c of cities) { if (c !== city && boxOverlapsDot(box, c.px, c.py)) overlapCount++; }
          if (overlapCount < minOverlapCount) { minOverlapCount = overlapCount; bestBox = box; }
          if (overlapCount === 0) break;
        }
        if (minOverlapCount === 0) break;
      }
    }

    const lbl = { city, lx: bestBox.lx, ly: bestBox.ly, anchor: bestBox.anchor, box: bestBox };
    city._label = lbl;
    placed.push(lbl);
  }

  return placed;
}


// ── MAP INIT ─────────────────────────────────────────────────────────────────
let cityNodes = null;
let zoomBehavior = null;
let svgSelection = null;

async function initMap() {
  const mapArea = document.getElementById('map-area');
  const svg = d3.select('#map-svg');
  svgSelection = svg;
  const W = mapArea.clientWidth, H = mapArea.clientHeight;

  svg.attr('viewBox', `0 0 ${W} ${H}`).attr('preserveAspectRatio', 'xMidYMid meet');

  const proj = d3.geoAlbersUsa()
    .scale(W * 1.25)
    .translate([W / 2, H / 2]);

  const path = d3.geoPath().projection(proj);

  // Zoom group — everything goes inside this
  const zoomG = svg.append('g').attr('class', 'zoom-layer');

  // Graticule
  const graticule = d3.geoGraticule()();
  zoomG.append('path').datum(graticule).attr('class','graticule').attr('d', path);

  // Load TopoJSON
  let us;
  try {
    us = await d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json');
  } catch(e) {
    document.getElementById('map-loading').textContent = 'Map tiles failed to load — check your connection.';
    return;
  }

  const states = topojson.feature(us, us.objects.states);
  const nation = topojson.mesh(us, us.objects.states, (a, b) => a === b);

  zoomG.selectAll('.state-path')
    .data(states.features)
    .join('path')
    .attr('class','state-path')
    .attr('d', path);

  zoomG.append('path').datum(nation).attr('class','nation-border').attr('d', path);

  // Project cities
  const projectedCities = CITIES.map(c => {
    const ll = lonLat[c.name];
    const pt = ll ? proj(ll) : null;
    return { ...c, px: pt ? pt[0] : null, py: pt ? pt[1] : null };
  }).filter(c => c.px !== null && c.py !== null);

  const cityG = zoomG.append('g').attr('class','cities-layer');

  // Pulse rings
  cityG.selectAll('.city-pulse')
    .data(projectedCities)
    .join('circle')
    .attr('class','city-pulse')
    .attr('cx', d => d.px).attr('cy', d => d.py)
    .attr('r', 0)
    .attr('fill', 'rgba(61,140,90,0.15)')
    .attr('stroke', 'rgba(61,140,90,0.3)')
    .attr('stroke-width', 1)
    .attr('pointer-events','none');

  // Dots
  cityG.selectAll('.city-circle')
    .data(projectedCities)
    .join('circle')
    .attr('class','city-circle')
    .attr('cx', d => d.px).attr('cy', d => d.py)
    .attr('r', 4)
    .attr('fill', '#8aaa8a')
    .attr('stroke', '#5a8a5a')
    .attr('stroke-width', 1.1)
    .on('mouseenter', showTooltip)
    .on('mousemove', moveTooltip)
    .on('mouseleave', hideTooltip);

  // Labels with collision avoidance
  const labelPlacements = computeLabelPositions(projectedCities);

  // Store placement data on each city for updateCities
  labelPlacements.forEach(lbl => { lbl.city._label = lbl; });

  // Leader lines (drawn below labels, only when label is pushed far)
  cityG.selectAll('.city-leader')
    .data(labelPlacements)
    .join('line')
    .attr('class','city-leader')
    .attr('x1', d => d.city.px)
    .attr('y1', d => d.city.py)
    .attr('x2', d => d.lx)
    .attr('y2', d => d.ly)
    .attr('stroke', '#8aaa8a')
    .attr('stroke-width', 0.6)
    .attr('opacity', d => d.box.dist > 14 ? 0.55 : 0)
    .attr('pointer-events','none');

  // White halo for readability
  cityG.selectAll('.city-label-halo')
    .data(labelPlacements)
    .join('text')
    .attr('class','city-label-halo')
    .attr('x', d => d.lx)
    .attr('y', d => d.ly)
    .attr('text-anchor', d => d.anchor)
    .attr('dominant-baseline', 'middle')
    .attr('font-size', 7.5).attr('font-weight','600')
    .attr('stroke', 'rgba(242,237,227,0.95)').attr('stroke-width', 3.5)
    .attr('stroke-linejoin', 'round')
    .attr('fill', 'none')
    .attr('pointer-events','none')
    .text(d => d.city.name);

  // Actual label text
  cityG.selectAll('.city-label')
    .data(labelPlacements)
    .join('text')
    .attr('class','city-label')
    .attr('x', d => d.lx)
    .attr('y', d => d.ly)
    .attr('text-anchor', d => d.anchor)
    .attr('dominant-baseline', 'middle')
    .attr('font-size', 7.5).attr('fill', '#2e3d2e').attr('font-weight','500')
    .attr('pointer-events','none')
    .text(d => d.city.name);

  cityNodes = projectedCities;

  // ── ZOOM BEHAVIOR ──────────────────────────────────────────────────────────
  zoomBehavior = d3.zoom()
    .scaleExtent([0.8, 12])
    .on('zoom', (event) => {
      zoomG.attr('transform', event.transform);
    });

  svg.call(zoomBehavior);

  // Prevent zoom from blocking tooltip on city hover
  svg.on('dblclick.zoom', null);

  // Zoom buttons
  document.getElementById('zoom-in').addEventListener('click', () => {
    svg.transition().duration(300).call(zoomBehavior.scaleBy, 1.5);
  });
  document.getElementById('zoom-out').addEventListener('click', () => {
    svg.transition().duration(300).call(zoomBehavior.scaleBy, 1 / 1.5);
  });
  document.getElementById('zoom-reset').addEventListener('click', () => {
    svg.transition().duration(500).call(zoomBehavior.transform, d3.zoomIdentity);
  });

  document.getElementById('map-loading').classList.add('done');
  updateCities();
}

// ── SCORING ──────────────────────────────────────────────────────────────────
function hasAnyFilter() {
  return activeMonths.size > 0 ||
    Object.values(activeFilters).some(s => s.size > 0);
}

function scoreCity(city) {
  const cats = ['landscape','atmosphere','style','budget'];
  for (const cat of cats) {
    if (activeFilters[cat].size === 0) continue;
    if (![...activeFilters[cat]].some(f => city[cat].includes(f))) return 'no_match';
  }
  if (activeMonths.size === 0) return 'match';
  return [...activeMonths].some(m => city.months.includes(m)) ? 'match' : 'wrong_season';
}

// ── UPDATE CITIES ─────────────────────────────────────────────────────────────
function updateCities() {
  if (!cityNodes) return;
  const hasFilters = hasAnyFilter();
  document.getElementById('hint').classList.toggle('hidden', hasFilters);

  let matchCount = 0;
  const svg = d3.select('#map-svg');

  svg.selectAll('.city-circle').each(function(d) {
    const score = hasFilters ? scoreCity(d) : null;
    const el = d3.select(this);
    let fill, stroke, r;

    if (!hasFilters) {
      fill = '#8aaa8a'; stroke = '#5a8a5a'; r = 4;
    } else if (score === 'match') {
      fill = '#3d8c5a'; stroke = '#2a6640'; r = 6; matchCount++;
    } else if (score === 'wrong_season') {
      fill = '#c44040'; stroke = '#903030'; r = 5;
    } else {
      fill = '#ccc6c0'; stroke = '#aaa49e'; r = 3;
    }
    el.attr('fill', fill).attr('stroke', stroke).attr('r', r);
    d._score = score;
  });

  svg.selectAll('.city-pulse').each(function(d) {
    const el = d3.select(this);
    el.attr('r', d._score === 'match' ? 10 : 0);
  });

  svg.selectAll('.city-label, .city-label-halo').each(function(d) {
    const el = d3.select(this);
    const city = d.city || d; // handle both placements and direct city data
    const isMatch = city._score === 'match';
    const noMatch = city._score === 'no_match';
    const isHalo = d3.select(this).classed('city-label-halo');
    el.attr('font-size', isMatch ? 9 : 7.5)
      .attr('font-weight', isMatch ? '700' : '500');
    if (!isHalo) {
      el.attr('fill', isMatch ? '#1a4a2a' : noMatch ? '#c0bbb5' : '#3a4a3a');
    }
  });

  svg.selectAll('.city-leader').each(function(d) {
    const city = d.city;
    const isMatch = city._score === 'match';
    const noMatch = city._score === 'no_match';
    d3.select(this).attr('stroke', isMatch ? '#2a6640' : noMatch ? '#ccc6c0' : '#8aaa8a')
      .attr('opacity', noMatch ? 0.25 : 0.5);
  });

  const pill = document.getElementById('match-pill');
  if (hasFilters) {
    pill.textContent = `${matchCount} ${matchCount === 1 ? 'match' : 'matches'}`;
    pill.classList.add('visible');
  } else {
    pill.classList.remove('visible');
  }
}

async function fetchCityImages(cityName) {
  if (imageCache[cityName]) return imageCache[cityName];
  const imgs = CITY_PHOTOS[cityName] || ["https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=2000&auto=format&fit=crop&q=60"];
  imageCache[cityName] = imgs;
  return imgs;
}

// ── SLIDESHOW STATE ───────────────────────────────────────────────────────────
let slideshowInterval = null;
let currentSlide = 0;

function startSlideshow(images) {
  const container = document.getElementById('tt-slideshow');
  const dotsEl = document.getElementById('tt-dots');

  // Remove old slides (keep dots container)
  container.querySelectorAll('.tt-slide').forEach(el => el.remove());
  dotsEl.innerHTML = '';
  currentSlide = 0;

  if (!images || images.length === 0) images = FALLBACK_IMGS;

  // Build slides
  images.forEach((src, i) => {
    const slide = document.createElement('div');
    slide.className = 'tt-slide' + (i === 0 ? ' active' : '');
    const img = document.createElement('img');
    img.src = src;
    img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;';
    img.onerror = () => { img.style.display = 'none'; slide.style.background = '#1a1612'; };
    slide.appendChild(img);
    container.insertBefore(slide, dotsEl);

    const dot = document.createElement('div');
    dot.className = 'tt-dot' + (i === 0 ? ' active' : '');
    dotsEl.appendChild(dot);
  });

  if (slideshowInterval) clearInterval(slideshowInterval);
  if (images.length <= 1) return;

  slideshowInterval = setInterval(() => {
    const slides = container.querySelectorAll('.tt-slide');
    const dots = dotsEl.querySelectorAll('.tt-dot');
    slides[currentSlide].classList.remove('active');
    dots[currentSlide].classList.remove('active');
    currentSlide = (currentSlide + 1) % slides.length;
    slides[currentSlide].classList.add('active');
    dots[currentSlide].classList.add('active');
  }, 2200);
}

function stopSlideshow() {
  if (slideshowInterval) { clearInterval(slideshowInterval); slideshowInterval = null; }
}

// ── TOOLTIP ───────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function showTooltip(event, d) {
  document.getElementById('tt-name').textContent = d.name;
  document.getElementById('tt-state').textContent = d.state;

  // Show placeholder while loading
  startSlideshow([`https://picsum.photos/seed/${d.name.charCodeAt(0)}/640/360`]);
  fetchCityImages(d.name).then(imgs => startSlideshow(imgs));

  const vibesEl = document.getElementById('tt-vibes');
  vibesEl.innerHTML = '';
  [...d.landscape, ...d.atmosphere].slice(0,6).forEach(v => {
    const s = document.createElement('span');
    s.className = 'tt-vibe'; s.textContent = v.replace('_',' ');
    vibesEl.appendChild(s);
  });

  document.getElementById('tt-months').textContent =
    'Best: ' + d.months.map(m => MONTH_NAMES[m-1]).join(', ');

  const warn = document.getElementById('tt-warn');
  warn.textContent = d._score === 'wrong_season'
    ? '⚠ Great vibe match, wrong season' : '';

  moveTooltip(event);
  tooltip.classList.add('show');
}

function moveTooltip(event) {
  const mapRect = document.getElementById('map-area').getBoundingClientRect();
  const TOOLTIP_W = 240;
  // Measure actual height; if not yet rendered, use a safe fallback
  const TOOLTIP_H = tooltip.offsetHeight > 50 ? tooltip.offsetHeight : 310;
  const OFFSET = 16;
  const MARGIN = 8;

  const cx = event.clientX - mapRect.left;
  const cy = event.clientY - mapRect.top;

  // Prefer right of cursor, flip left if overflow
  let x = cx + OFFSET;
  if (x + TOOLTIP_W + MARGIN > mapRect.width) x = cx - TOOLTIP_W - OFFSET;
  x = Math.max(MARGIN, Math.min(x, mapRect.width - TOOLTIP_W - MARGIN));

  // Prefer above cursor, drop below if overflow top
  let y = cy - TOOLTIP_H - OFFSET;
  if (y < MARGIN) y = cy + OFFSET;
  // If that still overflows bottom, pin to bottom margin
  y = Math.max(MARGIN, Math.min(y, mapRect.height - TOOLTIP_H - MARGIN));

  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}

function hideTooltip() {
  tooltip.classList.remove('show');
  stopSlideshow();
}

// ── UI BUILDERS ───────────────────────────────────────────────────────────────
function buildMonthGrid() {
  const grid = document.getElementById('month-grid');
  MONTHS.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'month-btn';
    btn.innerHTML = `<span class="month-num">${m.num}</span><span class="month-name">${m.name}</span>`;
    btn.addEventListener('click', () => {
      const mo = parseInt(m.num);
      activeMonths.has(mo) ? activeMonths.delete(mo) : activeMonths.add(mo);
      btn.classList.toggle('active');
      updateCities();
    });
    grid.appendChild(btn);
  });
}

function buildGroup(id, cat, items) {
  const g = document.getElementById(id);
  items.forEach(item => {
    const tag = document.createElement('button');
    tag.className = 'tag';
    tag.innerHTML = `<span class="icon">${item.icon}</span>${item.label}`;
    tag.addEventListener('click', () => {
      activeFilters[cat].has(item.id) ? activeFilters[cat].delete(item.id) : activeFilters[cat].add(item.id);
      tag.classList.toggle('active');
      updateCities();
    });
    g.appendChild(tag);
  });
}

function clearAll() {
  activeMonths.clear();
  Object.values(activeFilters).forEach(s => s.clear());
  document.querySelectorAll('.month-btn.active, .tag.active').forEach(el => el.classList.remove('active'));
  updateCities();
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
buildMonthGrid();
buildGroup('landscape-group','landscape',FILTERS.landscape);
buildGroup('atmosphere-group','atmosphere',FILTERS.atmosphere);
buildGroup('style-group','style',FILTERS.style);
buildGroup('budget-group','budget',FILTERS.budget);
initMap();
