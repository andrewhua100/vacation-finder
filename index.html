<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US Vibe Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f2ede3;
    --panel: #fdfaf4;
    --border: #ddd6c4;
    --text: #2a2418;
    --muted: #8a7f6e;
    --accent: #c4793a;
    --accent-light: #f5e8d8;
    --green: #3d8c5a;
    --red: #c44040;
    --amber: #c49a3a;
    --amber-light: #fdf3d8;
    --shadow: 0 2px 12px rgba(42,36,24,0.08);
    --shadow-lg: 0 8px 32px rgba(42,36,24,0.14);
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    align-items: center;
    padding: 12px 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    gap: 16px;
    flex-shrink: 0;
    box-shadow: var(--shadow);
    z-index: 10;
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 21px; font-weight: 700; letter-spacing: -0.3px; }
  .logo span { color: var(--accent); }
  .tagline { font-size: 11px; color: var(--muted); font-weight: 400; letter-spacing: 0.6px; text-transform: uppercase; margin-top: 1px; }
  .match-pill {
    margin-left: auto;
    background: var(--green);
    color: #fff;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 12.5px;
    font-weight: 600;
    transition: all 0.3s ease;
    opacity: 0;
  }
  .match-pill.visible { opacity: 1; }
  .main { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  .sidebar {
    width: 272px;
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 18px 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 9px;
  }
  .month-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
  .month-btn {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    padding: 7px 3px 5px;
    cursor: pointer;
    transition: all 0.14s ease;
    text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 1px;
    font-family: 'DM Sans', sans-serif;
  }
  .month-btn:hover { border-color: var(--amber); background: var(--amber-light); }
  .month-btn.active { background: var(--amber); border-color: var(--amber); color: #fff; }
  .month-num { font-size: 8.5px; font-weight: 600; opacity: 0.55; }
  .month-name { font-size: 11.5px; font-weight: 600; }
  .tag-group { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    display: flex; align-items: center; gap: 5px;
    padding: 6px 11px;
    border-radius: 18px;
    border: 1.5px solid var(--border);
    background: #fff;
    cursor: pointer;
    font-size: 12px; font-weight: 500;
    transition: all 0.14s ease;
    user-select: none;
    white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
  }
  .tag:hover { border-color: var(--accent); background: var(--accent-light); }
  .tag.active { background: var(--text); border-color: var(--text); color: #fff; }
  .tag .icon { font-size: 12px; }
  .clear-btn {
    background: none; border: 1.5px solid var(--border); border-radius: 7px;
    padding: 8px 14px; cursor: pointer; font-size: 12px; font-weight: 500;
    color: var(--muted); font-family: 'DM Sans', sans-serif;
    transition: all 0.14s ease; width: 100%;
  }
  .clear-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  /* MAP */
  .map-area { flex: 1; position: relative; overflow: hidden; background: #c8dce8; cursor: grab; }
  .map-area:active { cursor: grabbing; }
  #map-svg { width: 100%; height: 100%; }

  /* D3 map elements */
  .state-path { fill: #d6e8c4; stroke: #b4c8a0; stroke-width: 0.6px; transition: fill 0.2s; }
  .state-path:hover { fill: #c8e0b4; }
  .graticule { fill: none; stroke: #b8ccd8; stroke-width: 0.4px; }
  .nation-border { fill: none; stroke: #8aaa78; stroke-width: 1.2px; }

  .city-group { cursor: pointer; }
  .city-circle { transition: r 0.25s ease, fill 0.3s ease, opacity 0.3s ease; }
  .city-label {
    font-family: 'DM Sans', sans-serif;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .city-pulse { pointer-events: none; }

  /* Tooltip */
  #tooltip {
    position: absolute;
    background: #1e1a14;
    color: #fff;
    border-radius: 12px;
    font-size: 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s ease;
    width: 240px;
    z-index: 100;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
  }
  #tooltip.show { opacity: 1; }
  .tt-header { padding: 11px 14px 8px; }
  #tooltip .tt-name { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; margin-bottom: 1px; }
  #tooltip .tt-state { opacity: 0.5; font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; }

  /* Slideshow */
  .tt-slideshow {
    position: relative;
    width: 100%;
    height: 140px;
    background: #0e0c09;
    overflow: hidden;
  }
  .tt-slide {
    position: absolute;
    inset: 0;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.7s ease;
  }
  .tt-slide.active { opacity: 1; }
  .tt-slide-dots {
    position: absolute;
    bottom: 7px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 5px;
    z-index: 2;
  }
  .tt-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    transition: background 0.3s;
  }
  .tt-dot.active { background: #fff; }

  .tt-body { padding: 10px 14px 12px; }
  #tooltip .tt-vibes { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 7px; }
  #tooltip .tt-vibe { background: rgba(255,255,255,0.12); border-radius: 4px; padding: 2px 6px; font-size: 10px; text-transform: capitalize; }
  #tooltip .tt-months { font-size: 10px; opacity: 0.6; }
  #tooltip .tt-warn { color: #ff9a9a; font-size: 10px; margin-top: 4px; }

  /* Legend */
  .legend {
    position: absolute; bottom: 18px; right: 18px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 11px 15px; box-shadow: var(--shadow);
    z-index: 10;
  }
  .legend-title { font-size: 9.5px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .legend-row { display: flex; align-items: center; gap: 8px; font-size: 11.5px; font-weight: 500; margin-bottom: 5px; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  /* Zoom controls */
  .zoom-controls {
    position: absolute; bottom: 18px; left: 18px;
    display: flex; flex-direction: column; gap: 5px;
    z-index: 10;
  }
  .zoom-btn {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px; font-weight: 600;
    color: var(--muted); box-shadow: var(--shadow);
    font-family: 'DM Sans', sans-serif;
    transition: all 0.14s ease;
    line-height: 1;
  }
  .zoom-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .zoom-btn.reset { font-size: 11px; font-weight: 600; width: auto; padding: 0 10px; letter-spacing: 0.3px; }

  /* Hint bar */
  .hint {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 20px; padding: 7px 16px;
    font-size: 12px; color: var(--muted); box-shadow: var(--shadow);
    white-space: nowrap; pointer-events: none;
    transition: opacity 0.4s ease;
    z-index: 10;
  }
  .hint.hidden { opacity: 0; }

  /* Loading */
  .map-loading {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #c8dce8; font-size: 13px; color: #7090a0; font-weight: 500;
    pointer-events: none; transition: opacity 0.5s;
    z-index: 20;
  }
  .map-loading.done { opacity: 0; }
</style>
</head>

// ── MAP INIT ─────────────────────────────────────────────────────────────────
let cityNodes = null;
let zoomBehavior = null;
let svgSelection = null;

async function initMap() {
  const mapArea = document.getElementById('map-area');
  const svg = d3.select('#map-svg');
  svgSelection = svg;
  const W = mapArea.clientWidth, H = mapArea.clientHeight;

  svg.attr('viewBox', `0 0 ${W} ${H}`).attr('preserveAspectRatio', 'xMidYMid meet');

  const proj = d3.geoAlbersUsa()
    .scale(W * 1.25)
    .translate([W / 2, H / 2]);

  const path = d3.geoPath().projection(proj);

  // Zoom group — everything goes inside this
  const zoomG = svg.append('g').attr('class', 'zoom-layer');

  // Graticule
  const graticule = d3.geoGraticule()();
  zoomG.append('path').datum(graticule).attr('class','graticule').attr('d', path);

  // Load TopoJSON
  let us;
  try {
    us = await d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json');
  } catch(e) {
    document.getElementById('map-loading').textContent = 'Map tiles failed to load — check your connection.';
    return;
  }

  const states = topojson.feature(us, us.objects.states);
  const nation = topojson.mesh(us, us.objects.states, (a, b) => a === b);

  zoomG.selectAll('.state-path')
    .data(states.features)
    .join('path')
    .attr('class','state-path')
    .attr('d', path);

  zoomG.append('path').datum(nation).attr('class','nation-border').attr('d', path);

  // Project cities
  const projectedCities = CITIES.map(c => {
    const ll = lonLat[c.name];
    const pt = ll ? proj(ll) : null;
    return { ...c, px: pt ? pt[0] : null, py: pt ? pt[1] : null };
  }).filter(c => c.px !== null && c.py !== null);

  const cityG = zoomG.append('g').attr('class','cities-layer');

  // Pulse rings
  cityG.selectAll('.city-pulse')
    .data(projectedCities)
    .join('circle')
    .attr('class','city-pulse')
    .attr('cx', d => d.px).attr('cy', d => d.py)
    .attr('r', 0)
    .attr('fill', 'rgba(61,140,90,0.15)')
    .attr('stroke', 'rgba(61,140,90,0.3)')
    .attr('stroke-width', 1)
    .attr('pointer-events','none');

  // Dots
  cityG.selectAll('.city-circle')
    .data(projectedCities)
    .join('circle')
    .attr('class','city-circle')
    .attr('cx', d => d.px).attr('cy', d => d.py)
    .attr('r', 4)
    .attr('fill', '#8aaa8a')
    .attr('stroke', '#5a8a5a')
    .attr('stroke-width', 1.1)
    .on('mouseenter', showTooltip)
    .on('mousemove', moveTooltip)
    .on('mouseleave', hideTooltip);

  // Labels
  cityG.selectAll('.city-label')
    .data(projectedCities)
    .join('text')
    .attr('class','city-label')
    .attr('x', d => { const o = LABEL_OFFSETS[d.name]; return d.px + (o ? o[0] : 6); })
    .attr('y', d => { const o = LABEL_OFFSETS[d.name]; return d.py + (o ? o[1] : 3.5); })
    .attr('text-anchor', d => {
      const o = LABEL_OFFSETS[d.name];
      if (!o) return 'start';
      return o[2] === 'l' ? 'end' : o[2] === 'c' ? 'middle' : 'start';
    })
    .attr('font-size', 8).attr('fill', '#4a5a4a').attr('font-weight','500')
    .text(d => d.name);

  cityNodes = projectedCities;

  // ── ZOOM BEHAVIOR ──────────────────────────────────────────────────────────
  zoomBehavior = d3.zoom()
    .scaleExtent([0.8, 12])
    .on('zoom', (event) => {
      zoomG.attr('transform', event.transform);
    });

  svg.call(zoomBehavior);

  // Prevent zoom from blocking tooltip on city hover
  svg.on('dblclick.zoom', null);

  // Zoom buttons
  document.getElementById('zoom-in').addEventListener('click', () => {
    svg.transition().duration(300).call(zoomBehavior.scaleBy, 1.5);
  });
  document.getElementById('zoom-out').addEventListener('click', () => {
    svg.transition().duration(300).call(zoomBehavior.scaleBy, 1 / 1.5);
  });
  document.getElementById('zoom-reset').addEventListener('click', () => {
    svg.transition().duration(500).call(zoomBehavior.transform, d3.zoomIdentity);
  });

  document.getElementById('map-loading').classList.add('done');
  updateCities();
}

// ── SCORING ──────────────────────────────────────────────────────────────────
function hasAnyFilter() {
  return activeMonths.size > 0 ||
    Object.values(activeFilters).some(s => s.size > 0);
}

function scoreCity(city) {
  const cats = ['landscape','atmosphere','style','budget'];
  for (const cat of cats) {
    if (activeFilters[cat].size === 0) continue;
    if (![...activeFilters[cat]].some(f => city[cat].includes(f))) return 'no_match';
  }
  if (activeMonths.size === 0) return 'match';
  return [...activeMonths].some(m => city.months.includes(m)) ? 'match' : 'wrong_season';
}

// ── UPDATE CITIES ─────────────────────────────────────────────────────────────
function updateCities() {
  if (!cityNodes) return;
  const hasFilters = hasAnyFilter();
  document.getElementById('hint').classList.toggle('hidden', hasFilters);

  let matchCount = 0;
  const svg = d3.select('#map-svg');

  svg.selectAll('.city-circle').each(function(d) {
    const score = hasFilters ? scoreCity(d) : null;
    const el = d3.select(this);
    let fill, stroke, r;

    if (!hasFilters) {
      fill = '#8aaa8a'; stroke = '#5a8a5a'; r = 4;
    } else if (score === 'match') {
      fill = '#3d8c5a'; stroke = '#2a6640'; r = 6; matchCount++;
    } else if (score === 'wrong_season') {
      fill = '#c44040'; stroke = '#903030'; r = 5;
    } else {
      fill = '#ccc6c0'; stroke = '#aaa49e'; r = 3;
    }
    el.attr('fill', fill).attr('stroke', stroke).attr('r', r);
    d._score = score;
  });

  svg.selectAll('.city-pulse').each(function(d) {
    const el = d3.select(this);
    el.attr('r', d._score === 'match' ? 10 : 0);
  });

  svg.selectAll('.city-label').each(function(d) {
    const el = d3.select(this);
    const isMatch = d._score === 'match';
    const noMatch = d._score === 'no_match';
    const o = LABEL_OFFSETS[d.name];
    const baseDx = o ? o[0] : 6;
    const dx = baseDx > 0 ? baseDx + (isMatch ? 2 : 0) : baseDx - (isMatch ? 2 : 0);
    const dy = o ? o[1] : 3.5;
    el.attr('font-size', isMatch ? 9 : 7.5)
      .attr('font-weight', isMatch ? '700' : '400')
      .attr('fill', isMatch ? '#1a4a2a' : noMatch ? '#bbb6b0' : '#4a5a4a')
      .attr('x', d.px + dx)
      .attr('y', d.py + dy);
  });

  const pill = document.getElementById('match-pill');
  if (hasFilters) {
    pill.textContent = `${matchCount} ${matchCount === 1 ? 'match' : 'matches'}`;
    pill.classList.add('visible');
  } else {
    pill.classList.remove('visible');
  }
}

  "Tacoma":         "Tacoma Washington Mount Rainier waterfront",
  "Eugene":         "Eugene Oregon Willamette river Cascade mountains",
  "Bozeman":        "Bozeman Montana Bridger Mountains Yellowstone",
  "Fort Collins":   "Fort Collins Colorado Old Town mountains",
  "Flagstaff":      "Flagstaff Arizona Grand Canyon ponderosa pine mountains",
};

// Map tag IDs to visual search keywords
const TAG_KEYWORDS = {
  // Landscape
  beach:         'beach ocean waves sand',
  mountains:     'mountain peak alpine landscape',
  desert:        'desert landscape arid',
  forest:        'forest trees woodland',
  lakes:         'lake waterfront reflection',
  plains:        'open plains prairie horizon',
  canyon:        'canyon rock formation gorge',
  islands:       'tropical island coastline',
  // Atmosphere
  nightlife:     'city skyline night lights',
  culture:       'city landmark architecture',
  romantic:      'scenic viewpoint sunset',
  adventure:     'outdoor recreation landscape',
  foodie:        'outdoor market street food',
  relaxation:    'peaceful waterfront garden',
  family:        'park outdoor recreation',
  history:       'historic architecture old town',
  // Style
  ski:           'ski resort snow slopes',
  wellness:      'spa resort nature retreat',
  road_trip:     'scenic highway road landscape',
  city_break:    'city skyline aerial view',
  national_parks:'national park wilderness trail',
};

async function fetchCityImages(cityName) {
  if (imageCache[cityName]) return imageCache[cityName];

  // Find this city's tags to build targeted queries
  const cityData = CITIES.find(c => c.name === cityName);
  const tags = cityData ? [...cityData.landscape, ...cityData.atmosphere] : [];

  // Build 3 searches: city alone, city + top landscape tag, city + top atmosphere tag
  const base = CITY_SEARCH_TERMS[cityName] || cityName;
  const landscapeKw = tags.slice(0, 2).map(t => TAG_KEYWORDS[t] || t).join(' ');
  const queries = [
    base,
    `${cityName} ${TAG_KEYWORDS[tags[0]] || ''}`.trim(),
    `${cityName} ${TAG_KEYWORDS[tags[1]] || ''}`.trim(),
  ].filter((q, i, a) => a.indexOf(q) === i); // dedupe queries

  try {
    // Run all searches in parallel, filtering to images uploaded after 2010
    const searchResults = await Promise.all(queries.map(q =>
      fetch(`https://commons.wikimedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&srnamespace=6&srlimit=8&format=json&origin=*&srstart=2010-01-01T00:00:00Z`)
        .then(r => r.json())
        .then(d => (d.query.search || []).map(r => r.title))
        .catch(() => [])
    ));

    // Flatten, dedupe by title, keep only jpg/png, skip flags/maps/logos/old/drawings
    const seen = new Set();
    const titles = searchResults.flat().filter(t => {
      if (seen.has(t)) return false;
      seen.add(t);
      return /\.(jpg|jpeg|png)$/i.test(t) &&
        !/flag|seal|logo|map|locator|icon|blank|coa|coat|shield|diagram|emblem|tomb|grave|cemetery|headstone|plaque|portrait|sign|mural|wall|interior|indoor|museum_interior|hall|corridor|statue|bust|memorial_wall|inscription|drawing|sketch|painting|lithograph|engraving|illustration|vintage|historical|circa|bw|black.and.white|monochrome|1[0-9]{3}[^0-9]|19[0-6][0-9]|postcard|archive/i.test(t);
    }).slice(0, 12);

    if (titles.length === 0) throw new Error('no results');

    // Fetch all thumb URLs in one batch request, also get upload timestamp
    const thumbRes = await fetch(
      `https://commons.wikimedia.org/w/api.php?action=query&titles=${encodeURIComponent(titles.join('|'))}&prop=imageinfo&iiprop=url|timestamp&iiurlwidth=640&format=json&origin=*`
    );
    const thumbData = await thumbRes.json();

    // Dedupe by thumburl, also skip images uploaded before 2005
    const urlSeen = new Set();
    const imgs = Object.values(thumbData.query.pages)
      .filter(p => {
        if (!p.imageinfo || !p.imageinfo[0] || !p.imageinfo[0].thumburl) return false;
        const ts = p.imageinfo[0].timestamp || '';
        const year = parseInt(ts.slice(0, 4));
        return !year || year >= 2005;
      })
      .map(p => p.imageinfo[0].thumburl)
      .filter(url => { if (urlSeen.has(url)) return false; urlSeen.add(url); return true; })
      .slice(0, 4);

    if (imgs.length >= 2) {
      imageCache[cityName] = imgs;
      return imgs;
    }
  } catch(e) {}

  // Fallback: picsum
  const seed = encodeURIComponent(cityName);
  const fallback = [
    `https://picsum.photos/seed/${seed}a/640/360`,
    `https://picsum.photos/seed/${seed}b/640/360`,
    `https://picsum.photos/seed/${seed}c/640/360`,
  ];
  imageCache[cityName] = fallback;
  return fallback;
}

// ── SLIDESHOW STATE ───────────────────────────────────────────────────────────
let slideshowInterval = null;
let currentSlide = 0;

function startSlideshow(images) {
  const container = document.getElementById('tt-slideshow');
  const dotsEl = document.getElementById('tt-dots');

  // Remove old slides (keep dots container)
  container.querySelectorAll('.tt-slide').forEach(el => el.remove());
  dotsEl.innerHTML = '';
  currentSlide = 0;

  if (!images || images.length === 0) images = FALLBACK_IMGS;

  // Build slides
  images.forEach((src, i) => {
    const slide = document.createElement('div');
    slide.className = 'tt-slide' + (i === 0 ? ' active' : '');
    const img = document.createElement('img');
    img.src = src;
    img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;';
    img.onerror = () => { img.style.display = 'none'; slide.style.background = '#1a1612'; };
    slide.appendChild(img);
    container.insertBefore(slide, dotsEl);

    const dot = document.createElement('div');
    dot.className = 'tt-dot' + (i === 0 ? ' active' : '');
    dotsEl.appendChild(dot);
  });

  if (slideshowInterval) clearInterval(slideshowInterval);
  if (images.length <= 1) return;

  slideshowInterval = setInterval(() => {
    const slides = container.querySelectorAll('.tt-slide');
    const dots = dotsEl.querySelectorAll('.tt-dot');
    slides[currentSlide].classList.remove('active');
    dots[currentSlide].classList.remove('active');
    currentSlide = (currentSlide + 1) % slides.length;
    slides[currentSlide].classList.add('active');
    dots[currentSlide].classList.add('active');
  }, 2200);
}

function stopSlideshow() {
  if (slideshowInterval) { clearInterval(slideshowInterval); slideshowInterval = null; }
}

// ── TOOLTIP ───────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function showTooltip(event, d) {
  document.getElementById('tt-name').textContent = d.name;
  document.getElementById('tt-state').textContent = d.state;

  // Show placeholder while loading
  startSlideshow([`https://picsum.photos/seed/${d.name.charCodeAt(0)}/640/360`]);
  fetchCityImages(d.name).then(imgs => startSlideshow(imgs));

  const vibesEl = document.getElementById('tt-vibes');
  vibesEl.innerHTML = '';
  [...d.landscape, ...d.atmosphere].slice(0,6).forEach(v => {
    const s = document.createElement('span');
    s.className = 'tt-vibe'; s.textContent = v.replace('_',' ');
    vibesEl.appendChild(s);
  });

  document.getElementById('tt-months').textContent =
    'Best: ' + d.months.map(m => MONTH_NAMES[m-1]).join(', ');

  const warn = document.getElementById('tt-warn');
  warn.textContent = d._score === 'wrong_season'
    ? '⚠ Great vibe match, wrong season' : '';

  moveTooltip(event);
  tooltip.classList.add('show');
}

function moveTooltip(event) {
  const rect = document.getElementById('map-area').getBoundingClientRect();
  let x = event.clientX - rect.left + 14;
  let y = event.clientY - rect.top - 14;
  if (x + 250 > rect.width) x = event.clientX - rect.left - 255;
  if (y + 320 > rect.height) y = event.clientY - rect.top - 320;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function hideTooltip() {
  tooltip.classList.remove('show');
  stopSlideshow();
}

// ── UI BUILDERS ───────────────────────────────────────────────────────────────
function buildMonthGrid() {
  const grid = document.getElementById('month-grid');
  MONTHS.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'month-btn';
    btn.innerHTML = `<span class="month-num">${m.num}</span><span class="month-name">${m.name}</span>`;
    btn.addEventListener('click', () => {
      const mo = parseInt(m.num);
      activeMonths.has(mo) ? activeMonths.delete(mo) : activeMonths.add(mo);
      btn.classList.toggle('active');
      updateCities();
    });
    grid.appendChild(btn);
  });
}

function buildGroup(id, cat, items) {
  const g = document.getElementById(id);
  items.forEach(item => {
    const tag = document.createElement('button');
    tag.className = 'tag';
    tag.innerHTML = `<span class="icon">${item.icon}</span>${item.label}`;
    tag.addEventListener('click', () => {
      activeFilters[cat].has(item.id) ? activeFilters[cat].delete(item.id) : activeFilters[cat].add(item.id);
      tag.classList.toggle('active');
      updateCities();
    });
    g.appendChild(tag);
  });
}

function clearAll() {
  activeMonths.clear();
  Object.values(activeFilters).forEach(s => s.clear());
  document.querySelectorAll('.month-btn.active, .tag.active').forEach(el => el.classList.remove('active'));
  updateCities();
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
buildMonthGrid();
buildGroup('landscape-group','landscape',FILTERS.landscape);
buildGroup('atmosphere-group','atmosphere',FILTERS.atmosphere);
buildGroup('style-group','style',FILTERS.style);
buildGroup('budget-group','budget',FILTERS.budget);
initMap();
