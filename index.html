<title>US Vibe Finder</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f2ede3;
    --panel: #fdfaf4;
    --border: #ddd6c4;
    --text: #2a2418;
    --muted: #8a7f6e;
    --accent: #c4793a;
    --accent-light: #f5e8d8;
    --green: #3d8c5a;
    --red: #c44040;
    --amber: #c49a3a;
    --amber-light: #fdf3d8;
    --shadow: 0 2px 12px rgba(42,36,24,0.08);
    --shadow-lg: 0 8px 32px rgba(42,36,24,0.14);
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    align-items: center;
    padding: 12px 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    gap: 16px;
    flex-shrink: 0;
    box-shadow: var(--shadow);
    z-index: 10;
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 21px; font-weight: 700; letter-spacing: -0.3px; }
  .logo span { color: var(--accent); }
  .tagline { font-size: 11px; color: var(--muted); font-weight: 400; letter-spacing: 0.6px; text-transform: uppercase; margin-top: 1px; }
  .match-pill {
    margin-left: auto;
    background: var(--green);
    color: #fff;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 12.5px;
    font-weight: 600;
    transition: all 0.3s ease;
    opacity: 0;
  }
  .match-pill.visible { opacity: 1; }
  .main { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  .sidebar {
    width: 272px;
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 18px 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 9px;
  }
  .month-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
  .month-btn {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    padding: 7px 3px 5px;
    cursor: pointer;
    transition: all 0.14s ease;
    text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 1px;
    font-family: 'DM Sans', sans-serif;
  }
  .month-btn:hover { border-color: var(--amber); background: var(--amber-light); }
  .month-btn.active { background: var(--amber); border-color: var(--amber); color: #fff; }
  .month-num { font-size: 8.5px; font-weight: 600; opacity: 0.55; }
  .month-name { font-size: 11.5px; font-weight: 600; }
  .tag-group { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    display: flex; align-items: center; gap: 5px;
    padding: 6px 11px;
    border-radius: 18px;
    border: 1.5px solid var(--border);
    background: #fff;
    cursor: pointer;
    font-size: 12px; font-weight: 500;
    transition: all 0.14s ease;
    user-select: none;
    white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
  }
  .tag:hover { border-color: var(--accent); background: var(--accent-light); }
  .tag.active { background: var(--text); border-color: var(--text); color: #fff; }
  .tag .icon { font-size: 12px; }
  .clear-btn {
    background: none; border: 1.5px solid var(--border); border-radius: 7px;
    padding: 8px 14px; cursor: pointer; font-size: 12px; font-weight: 500;
    color: var(--muted); font-family: 'DM Sans', sans-serif;
    transition: all 0.14s ease; width: 100%;
  }
  .clear-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  /* MAP */
  .map-area { flex: 1; position: relative; overflow: hidden; background: #c8dce8; }
  #map-svg { width: 100%; height: 100%; }

  /* D3 map elements */
  .state-path { fill: #d6e8c4; stroke: #b4c8a0; stroke-width: 0.6px; transition: fill 0.2s; }
  .state-path:hover { fill: #c8e0b4; }
  .graticule { fill: none; stroke: #b8ccd8; stroke-width: 0.4px; }
  .nation-border { fill: none; stroke: #8aaa78; stroke-width: 1.2px; }

  .city-group { cursor: pointer; }
  .city-circle { transition: r 0.25s ease, fill 0.3s ease, opacity 0.3s ease; }
  .city-label {
    font-family: 'DM Sans', sans-serif;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .city-pulse { pointer-events: none; }

  /* Tooltip */
  #tooltip {
    position: absolute;
    background: #1e1a14;
    color: #fff;
    padding: 11px 14px;
    border-radius: 10px;
    font-size: 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s ease;
    max-width: 210px;
    z-index: 100;
    box-shadow: var(--shadow-lg);
  }
  #tooltip.show { opacity: 1; }
  #tooltip .tt-name { font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  #tooltip .tt-state { opacity: 0.5; font-size: 10px; margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.8px; }
  #tooltip .tt-vibes { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 7px; }
  #tooltip .tt-vibe { background: rgba(255,255,255,0.12); border-radius: 4px; padding: 2px 6px; font-size: 10px; text-transform: capitalize; }
  #tooltip .tt-months { font-size: 10px; opacity: 0.6; }
  #tooltip .tt-warn { color: #ff9a9a; font-size: 10px; margin-top: 4px; }

  /* Legend */
  .legend {
    position: absolute; bottom: 18px; right: 18px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 11px 15px; box-shadow: var(--shadow);
  }
  .legend-title { font-size: 9.5px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .legend-row { display: flex; align-items: center; gap: 8px; font-size: 11.5px; font-weight: 500; margin-bottom: 5px; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  /* Hint bar */
  .hint {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 20px; padding: 7px 16px;
    font-size: 12px; color: var(--muted); box-shadow: var(--shadow);
    white-space: nowrap; pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .hint.hidden { opacity: 0; }

  /* Loading */
  .map-loading {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #c8dce8; font-size: 13px; color: #7090a0; font-weight: 500;
    pointer-events: none; transition: opacity 0.5s;
  }
  .map-loading.done { opacity: 0; }
</style>

// ── STATE ────────────────────────────────────────────────────────────────────

    .scale(W * 1.25)
    .translate([W / 2, H / 2]);

  const nation = topojson.mesh(us, us.objects.states, (a, b) => a === b);

    .data(states.features)
    .join('path')

  // Dots

  // Per-city label placement overrides: [dx, dy, anchor]
  // 'r' = right, 'l' = left, 'c' = center (above/below)
  const LABEL_OFFSETS = {
    // Colorado cluster — spread around the dots
    "Denver":       [7,  -7,  'r'],

    // New Mexico cluster

    "Sedona":       [7,  -7,  'r'],

    "Tucson":       [7,   4,  'r'],
    // Nevada
    "Las Vegas":    [-6, -7,  'l'],
    // CA coast — nudge up so not stacked
    "San Francisco":[-6, -7,  'l'],

    "Charlotte":    [7,  -7,  'r'],
    "Asheville":    [-6,  9,  'l'],
    "Charleston":   [7,   4,  'r'],

    // FL
    "Tampa":        [-6, -7,  'l'],
    "Orlando":      [7,  -7,  'r'],
    "Key West":     [-6,  9,  'l'],
    // New England
    "Burlington":   [-6, -7,  'l'],
    "Portland ME":  [7,   4,  'r'],
    // Midwest
    "Milwaukee":    [-6, -7,  'l'],
    "Cleveland":    [7,  -7,  'r'],
    "Detroit":      [7,  -7,  'r'],
    "Columbus":     [7,   4,  'r'],
    "Indianapolis": [-6,  9,  'l'],
    "St. Louis":    [7,  -7,  'r'],
    "Kansas City":  [-6,  9,  'l'],
    "Minneapolis":  [-6, -7,  'l'],
    // Pacific NW
    "Portland":     [-6, -7,  'l'],
    "Bend":         [7,   4,  'r'],
    // HI/AK
    "Honolulu":     [-6, -7,  'l'],
    "Maui":         [7,   4,  'r'],
    "Anchorage":    [7,  -7,  'r'],

  cityG.selectAll('.city-label')
    .data(projectedCities)
    .join('text')
    .attr('class','city-label')
    .attr('x', d => { const o = LABEL_OFFSETS[d.name]; return d.px + (o ? o[0] : 6); })
    .attr('y', d => { const o = LABEL_OFFSETS[d.name]; return d.py + (o ? o[1] : 3.5); })
    .attr('text-anchor', d => {
      const o = LABEL_OFFSETS[d.name];
      if (!o) return 'start';
      return o[2] === 'l' ? 'end' : o[2] === 'c' ? 'middle' : 'start';
    })
    .attr('font-size', 8).attr('fill', '#4a5a4a').attr('font-weight','500')
    .text(d => d.name);

  cityNodes = projectedCities;

  document.getElementById('map-loading').classList.add('done');
  updateCities();
}

// ── SCORING ──────────────────────────────────────────────────────────────────
function hasAnyFilter() {
  return activeMonths.size > 0 ||
    Object.values(activeFilters).some(s => s.size > 0);
}

function scoreCity(city) {
  const cats = ['landscape','atmosphere','style','budget'];
  for (const cat of cats) {
    if (activeFilters[cat].size === 0) continue;
    if (![...activeFilters[cat]].some(f => city[cat].includes(f))) return 'no_match';
  }
  if (activeMonths.size === 0) return 'match';
  return [...activeMonths].some(m => city.months.includes(m)) ? 'match' : 'wrong_season';
}

// ── UPDATE CITIES ─────────────────────────────────────────────────────────────
function updateCities() {
  if (!cityNodes) return;
  const hasFilters = hasAnyFilter();
  document.getElementById('hint').classList.toggle('hidden', hasFilters);

  let matchCount = 0;
  const svg = d3.select('#map-svg');

  svg.selectAll('.city-circle').each(function(d) {
    const score = hasFilters ? scoreCity(d) : null;
    const el = d3.select(this);
    let fill, stroke, r;

    if (!hasFilters) {
      fill = '#8aaa8a'; stroke = '#5a8a5a'; r = 4;
    } else if (score === 'match') {
      fill = '#3d8c5a'; stroke = '#2a6640'; r = 6; matchCount++;
    } else if (score === 'wrong_season') {
      fill = '#c44040'; stroke = '#903030'; r = 5;
    } else {
      fill = '#ccc6c0'; stroke = '#aaa49e'; r = 3;
    }
    el.attr('fill', fill).attr('stroke', stroke).attr('r', r);
    d._score = score;
  });

  // Pulse rings
  svg.selectAll('.city-pulse').each(function(d) {
    const el = d3.select(this);
    el.attr('r', d._score === 'match' ? 10 : 0);
  });

  // Labels
  svg.selectAll('.city-label').each(function(d) {
    const el = d3.select(this);
    const isMatch = d._score === 'match';
    const noMatch = d._score === 'no_match';
    const o = LABEL_OFFSETS[d.name];
    const baseDx = o ? o[0] : 6;
    const dx = baseDx > 0 ? baseDx + (isMatch ? 2 : 0) : baseDx - (isMatch ? 2 : 0);
    const dy = o ? o[1] : 3.5;
    el.attr('font-size', isMatch ? 9 : 7.5)
      .attr('font-weight', isMatch ? '700' : '400')
      .attr('fill', isMatch ? '#1a4a2a' : noMatch ? '#bbb6b0' : '#4a5a4a')
      .attr('x', d.px + dx)
      .attr('y', d.py + dy);
  });

  // Match pill
  const pill = document.getElementById('match-pill');
  if (hasFilters) {
    pill.textContent = `${matchCount} ${matchCount === 1 ? 'match' : 'matches'}`;
    pill.classList.add('visible');
  } else {
    pill.classList.remove('visible');
  }
}

// ── TOOLTIP ───────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function showTooltip(event, d) {
  document.getElementById('tt-name').textContent = d.name;
  document.getElementById('tt-state').textContent = d.state;

  const vibesEl = document.getElementById('tt-vibes');
  vibesEl.innerHTML = '';
  [...d.landscape, ...d.atmosphere].slice(0,5).forEach(v => {
    const s = document.createElement('span');
    s.className = 'tt-vibe'; s.textContent = v.replace('_',' ');
    vibesEl.appendChild(s);
  });

  document.getElementById('tt-months').textContent =
    'Best: ' + d.months.map(m => MONTH_NAMES[m-1]).join(', ');

  const warn = document.getElementById('tt-warn');
  warn.textContent = d._score === 'wrong_season'
    ? '⚠ Great vibe match, wrong season' : '';

  moveTooltip(event);
  tooltip.classList.add('show');
}

function moveTooltip(event) {
  const rect = document.getElementById('map-area').getBoundingClientRect();
  let x = event.clientX - rect.left + 14;
  let y = event.clientY - rect.top - 14;
  if (x + 225 > rect.width) x = event.clientX - rect.left - 225;
  if (y + 130 > rect.height) y = event.clientY - rect.top - 140;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function hideTooltip() { tooltip.classList.remove('show'); }

// ── UI BUILDERS ───────────────────────────────────────────────────────────────
function buildMonthGrid() {
  const grid = document.getElementById('month-grid');
  MONTHS.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'month-btn';
    btn.innerHTML = `<span class="month-num">${m.num}</span><span class="month-name">${m.name}</span>`;
    btn.addEventListener('click', () => {
      const mo = parseInt(m.num);
      activeMonths.has(mo) ? activeMonths.delete(mo) : activeMonths.add(mo);
      btn.classList.toggle('active');
      updateCities();
    });
    grid.appendChild(btn);
  });
}

function buildGroup(id, cat, items) {
  const g = document.getElementById(id);
  items.forEach(item => {
    const tag = document.createElement('button');
    tag.className = 'tag';
    tag.innerHTML = `<span class="icon">${item.icon}</span>${item.label}`;
    tag.addEventListener('click', () => {
      activeFilters[cat].has(item.id) ? activeFilters[cat].delete(item.id) : activeFilters[cat].add(item.id);
      tag.classList.toggle('active');
      updateCities();
    });
    g.appendChild(tag);
  });
}

function clearAll() {
  activeMonths.clear();
  Object.values(activeFilters).forEach(s => s.clear());
  document.querySelectorAll('.month-btn.active, .tag.active').forEach(el => el.classList.remove('active'));
  updateCities();
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
buildMonthGrid();
buildGroup('landscape-group','landscape',FILTERS.landscape);
buildGroup('atmosphere-group','atmosphere',FILTERS.atmosphere);
buildGroup('style-group','style',FILTERS.style);
buildGroup('budget-group','budget',FILTERS.budget);
initMap();
</script>
